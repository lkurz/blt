####
# This is the share configuration of jobs for matrix
.on_matrix:
  variables:
  tags:
    - shell
    - matrix
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /_lnone/ || $ON_MATRIX == "OFF"' #run except if ...
      when: never
    - when: on_success

####
# Load required modules
.with_cuda:
  before_script:
    - module load cmake/3.18.0
    - module load cuda/11.2.0

####
# Template
.build_on_matrix:
  stage: build
  variables:
    ALLOC_COMMAND: "flux run -t15m -n1"
  extends: [.build_script, .on_matrix]
  needs: []

####
# Template
.run_project_integration_test_on_matrix:
  stage: build
  variables:
    ALLOC_COMMAND: "flux run -t15m -n1"
  extends: [.run_project_integration_tests, .on_matrix]
  needs: []

####
# Build jobs
matrix-clang_14.0.6:
  variables:
    HOST_CONFIG: "clang@14.0.6.cmake"
  extends: [.build_on_matrix]


